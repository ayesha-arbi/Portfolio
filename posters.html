<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />

    <title>Landing Pages</title>

    <style>
        /* page */

        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* container */

        .lp-container {
           
            min-height: 100vh;
            padding: 8vw 10vw;
        }

        /* title */

        .lp-title {
            font-size: 7vw;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px white;
            margin-bottom: 4vw;
            transition: all .4s ease;
        }

        .lp-title:hover {
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        /* project card */

        .project-card {
            background: #111;
            border-radius: 16px;
            padding: 3vw;
            margin-bottom: 4vw;
            transition: .4s ease;
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.08);
        }

        /* project text */

        .project-info h2 {
            font-size: 3vw;
            margin-bottom: 1vw;
        }

        .project-info p {
            color: #aaa;
            font-size: 1.1vw;
            max-width: 600px;
            margin-bottom: 2vw;
        }

        /* visit button */

        .visit-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 22px;
            border: 1px solid white;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-size: .9vw;
            transition: .3s ease;
        }

        .visit-btn:hover {
            background: white;
            color: black;
        }

        /* gallery */

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2vw;
        }

        /* gallery images */

        .gallery img {
            width: 100%;
            border-radius: 12px;
            transition: .4s ease;
        }

        .gallery img:hover {
            transform: scale(1.03);
        }

        /* mobile */

        @media (max-width:768px) {

            .lp-title {
                font-size: 12vw;
            }

            .project-info h2 {
                font-size: 6vw;
            }

            .project-info p {
                font-size: 3.5vw;
            }

            .visit-btn {
                font-size: 3vw;
            }

            .gallery {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                /* always 2 columns */
                gap: 2vw;
            }

            .gallery img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                /* prevents stretching */
                border-radius: 12px;
                aspect-ratio: 4 / 3;
                /* keeps images consistent */
                transition: transform .4s ease;
            }

            .gallery img:hover {
                transform: scale(1.03);
            }

        }
    </style>

</head>

<body>

    <div class="lp-container">

        <h1 class="lp-title">POSTERS</h1>

        
        <div class="gallery">

            <img src="img8.jpg">
            <img src="img6.jpg">
            <img src="img5.jpg">
            <img src="img4.jpg">
            <img src="img3.jpg">
            <img src="supra.png">
            <img src="noviq.png">
            <img src="addiction.png">
            <img src="notevia.png">

        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
